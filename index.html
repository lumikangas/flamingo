<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lintu Guru: Flamingo-Invaasio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --neon-pink: #ff007f;
            --neon-purple: #bc13fe;
            --bg-dark: #020617;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark);
            color: white; 
            overflow: hidden;
            height: 100dvh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .bungee { font-family: 'Bungee Inline', cursive; }

        .glass-panel {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 20;
            width: 100%;
            height: 100%;
            transition: box-shadow 0.3s ease;
        }

        @media (min-width: 640px) {
            .glass-panel {
                width: 400px;
                height: 90dvh;
                border-radius: 2rem;
            }
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            min-height: 56px;
        }

        .option-btn.correct { background: #22c55e !important; border-color: #4ade80 !important; transform: scale(1.05); }
        .option-btn.wrong { background: #ef4444 !important; border-color: #f87171 !important; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #timer-bar {
            height: 100%;
            background: linear-gradient(to right, var(--neon-pink), #ff77ff);
            width: 100%;
            transition: width 0.1s linear;
        }

        /* KURKKIVA FLAMINGO */
        .peeking-flamingo {
            position: fixed;
            z-index: 1000;
            font-size: 10rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            display: none;
            filter: drop-shadow(0 0 20px var(--neon-pink));
        }

        .peeking-flamingo.active { display: block; opacity: 1; }
        
        .peeking-flamingo.bottom { bottom: -30px; left: 50%; transform: translate(-50%, 100%); }
        .peeking-flamingo.left { left: -30px; top: 50%; transform: translate(-100%, -50%) rotate(90deg); }
        .peeking-flamingo.right { right: -30px; top: 50%; transform: translate(100%, -50%) rotate(-90deg); }

        .peeking-flamingo.active.bottom { transform: translate(-50%, 0) scale(1.2); }
        .peeking-flamingo.active.left { transform: translate(0, -50%) rotate(90deg) scale(1.2); }
        .peeking-flamingo.active.right { transform: translate(0, -50%) rotate(-90deg) scale(1.2); }

        .speech-bubble {
            position: fixed;
            background: #fff;
            color: #000;
            padding: 15px 25px;
            border-radius: 25px;
            font-weight: 900;
            font-size: 1rem;
            box-shadow: 0 15px 40px rgba(255,0,127,0.4);
            z-index: 1001;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 250px;
            pointer-events: none;
            text-align: center;
            border: 3px solid var(--neon-pink);
        }
        .speech-bubble.active { opacity: 1; }

        /* TORNI JA HULLUTTELU */
        .tower-flamingo {
            position: absolute;
            font-size: 3.5rem;
            z-index: 15;
            filter: drop-shadow(0 0 8px var(--neon-pink));
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), flamingoVibe 2s ease-in-out infinite;
        }
        @keyframes popIn { 0% { scale: 0; rotate: -90deg; } 100% { scale: 1; rotate: 0; } }
        @keyframes flamingoVibe {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .milestone-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 0, 127, 0.3);
            backdrop-filter: blur(10px);
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .milestone-overlay.active { display: flex; animation: bgFlash 0.5s infinite; }
        @keyframes bgFlash { 0%, 100% { background: rgba(255, 0, 127, 0.3); } 50% { background: rgba(188, 19, 254, 0.3); } }

        .f-disco { animation: disco 1s infinite; }
        @keyframes disco {
            0% { color: #ff007f; text-shadow: 0 0 10px #ff007f; }
            50% { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
            100% { color: #bc13fe; text-shadow: 0 0 10px #bc13fe; }
        }
    </style>
</head>

        // --- FLAMINGO-ÄÄNET ---
        function playFlamingoSound(type) {
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);

            if(type === 'honk') { // "Iloinen rääkäisy"
                const osc = audioCtx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.connect(gain);
                osc.start(); osc.stop(now + 0.3);
            } else if(type === 'fail') { // "Vihainen rääkäisy"
                const osc = audioCtx.createOscillator();
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(50, now + 0.5);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.connect(gain);
                osc.start(); osc.stop(now + 0.5);
            }
        }

        function showPeeker(text) {
            const peeker = document.getElementById('peeker');
            const bubble = document.getElementById('bubble');
            const pos = ['bottom', 'left', 'right'][Math.floor(Math.random()*3)];
            
            playFlamingoSound('fail');
            peeker.innerText = FLAMINGOS[Math.floor(Math.random()*FLAMINGOS.length)];
            peeker.className = `peeking-flamingo ${pos} active`;
            bubble.innerText = text;
            bubble.classList.add('active');

            if(pos === 'bottom') { bubble.style.bottom = '200px'; bubble.style.left = '50%'; bubble.style.transform = 'translateX(-50%)'; bubble.style.right = 'auto'; bubble.style.top = 'auto'; }
            else if(pos === 'left') { bubble.style.top = '50%'; bubble.style.left = '150px'; bubble.style.bottom = 'auto'; bubble.style.right = 'auto'; bubble.style.transform = 'translateY(-50%)'; }
            else { bubble.style.top = '50%'; bubble.style.right = '150px'; bubble.style.left = 'auto'; bubble.style.bottom = 'auto'; bubble.style.transform = 'translateY(-50%)'; }

            setTimeout(() => {
                peeker.classList.remove('active');
                bubble.classList.remove('active');
            }, 3000);
        }

        function addTowerFlamingo() {
            state.towerCount++;
            const f = document.createElement('div');
            f.className = 'tower-flamingo';
            f.innerText = FLAMINGOS[Math.floor(Math.random()*FLAMINGOS.length)];
            
            const side = Math.random() > 0.5 ? 'left' : 'right';
            f.style[side] = (Math.random() * 30) + 'px';
            f.style.bottom = (state.towerCount * 45) + 'px';
            f.style.animationDelay = (Math.random() * 2) + 's';
            
            document.getElementById('tower-layer').appendChild(f);
        }

        function triggerMilestone() {
            const screen = document.getElementById('milestone-screen');
            document.getElementById('milestone-text').innerText = `${state.index} MAATA DOMINOITU!`;
            screen.classList.add('active');
            addTowerFlamingo();
            playFlamingoSound('honk');
            
            setTimeout(() => {
                screen.classList.remove('active');
                nextQuestion();
            }, 2500);
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            state.score = 0; state.index = 0; state.multiplier = 1.0; state.towerCount = 0;
            state.deck = [...KAIKKI_MAAT].sort(() => Math.random() - 0.5);
            document.getElementById('tower-layer').innerHTML = '';
            showView('view-quiz');
            nextQuestion();
        }

        function nextQuestion() {
            state.isLock = false;
            const cur = state.deck[state.index];
            document.getElementById('ui-progress-text').innerText = `Maa ${state.index + 1} / ${state.deck.length}`;
            document.getElementById('ui-flag').innerText = cur.f;
            document.getElementById('ui-country').innerText = cur.n;
            document.getElementById('ui-score').innerText = state.score;
            document.getElementById('ui-multiplier').innerText = `x${state.multiplier.toFixed(1)}`;

            let opts = [cur];
            while(opts.length < 4) {
                let r = KAIKKI_MAAT[Math.floor(Math.random()*KAIKKI_MAAT.length)];
                if(!opts.find(o => o.c === r.c)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'option-btn w-full p-4 rounded-2xl text-lg font-black text-white shadow-lg flex justify-center items-center';
                b.innerHTML = `<span>${o.c}</span>`;
                b.onclick = () => handleAnswer(o.c === cur.c, b);
                grid.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(state.timerInterval);
            state.timeLeft = 100;
            const bar = document.getElementById('timer-bar');
            state.timerInterval = setInterval(() => {
                if(state.isLock) return;
                state.timeLeft -= 0.7; // Hieman nopeampi mobiiliin
                bar.style.width = state.timeLeft + '%';
                if(state.timeLeft <= 0) handleAnswer(false, null);
            }, 50);
        }

        function handleAnswer(correct, btn) {
            if(state.isLock) return;
            state.isLock = true;
            clearInterval(state.timerInterval);

            if(correct) {
                btn?.classList.add('correct');
                playFlamingoSound('honk');
                state.score += Math.round((60 + state.timeLeft) * state.multiplier);
                state.multiplier += 0.05;
                state.index++;
                
                setTimeout(() => {
                    if(state.index >= state.deck.length) gameOver(win = true);
                    else if(state.index > 0 && state.index % 10 === 0) triggerMilestone();
                    else nextQuestion();
                }, 600);
            } else {
                btn?.classList.add('wrong');
                showPeeker(KUITIT[Math.floor(Math.random() * KUITIT.length)]);
                setTimeout(gameOver, 2500);
            }
        }

        function showView(id) {
            ['view-start', 'view-quiz', 'view-gameover'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('top-bar').classList.toggle('hidden', id !== 'view-quiz');
        }

        function gameOver(win = false) {
            document.getElementById('final-score').innerText = state.score;
            document.getElementById('final-status').innerText = win ? 'FLAMINGO-JUMALA' : 'TURISTI';
            document.getElementById('over-icon').innerText = win ? '🏆' : '🍗';
            document.getElementById('save-section').classList.toggle('hidden', state.score === 0);
            showView('view-gameover');
        }

        function saveScore() {
            const name = document.getElementById('player-name').value.trim().toUpperCase() || 'LINNUNRUOKA';
            state.highScores.push({name, score: state.score});
            state.highScores.sort((a,b) => b.score - a.score);
            state.highScores = state.highScores.slice(0, 5);
            localStorage.setItem('bird_scores_v5', JSON.stringify(state.highScores));
            updateLB();
            showView('view-start');
        }

        function updateLB() {
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = state.highScores.map(s => `
                <div class="flex justify-between bg-white/5 p-3 rounded-xl border border-pink-500/20 text-xs">
                    <span class="font-black text-pink-400">${s.name}</span>
                    <span class="text-white font-black">${s.score}</span>
                </div>
            `).join('');
        }

        document.getElementById('btn-start').onclick = startGame;
        document.getElementById('btn-retry').onclick = () => showView('view-start');
        document.getElementById('btn-save').onclick = saveScore;
        updateLB();
    </script>
</body>
</html>
